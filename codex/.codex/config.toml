# Codex CLI global configuration
model = "gpt-5.4"
approval_policy = "on-failure"

# Sandbox enabled — OS-level isolation (macOS seatbelt / Linux containers)
# Blocks network access and filesystem writes outside the project
sandbox = true
model_reasoning_effort = "medium"

[tui]
status_line = [
  "model-with-reasoning",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
]

[tui.model_availability_nux]
"gpt-5.5" = 4

[sandbox_workspace_write]
writable_roots = [
  "/Users/jeordin.callister/personal/topout",
  "/Users/jeordin.callister/Library/Mobile Documents/iCloud~md~obsidian/Documents/jeordin-vault/topout",
]

[projects."/Users/jeordin.callister/personal/topout"]
trust_level = "trusted"

[projects."/Users/jeordin.callister/unicity/new-shop"]
trust_level = "trusted"

[projects."/Users/jeordin.callister/unicity/UFeelGreat"]
trust_level = "trusted"

[projects."/Users/jeordin.callister/dotfiles"]
trust_level = "trusted"

[projects."/Users/jeordin.callister/unicity"]
trust_level = "trusted"

[projects."/Users/jeordin.callister/unicity/responsible-ai"]
trust_level = "trusted"

